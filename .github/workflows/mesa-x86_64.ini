[binaries]
c = 'clang'
cpp = 'clang++'
objc = 'clang'
objcpp = 'clang++'
ar = 'ar'
strip = 'strip'
pkg-config = 'pkg-config'
llvm-config = '/opt/homebrew/opt/llvm/bin/llvm-config'

[built-in options]
c_args = ['-target', 'x86_64-apple-darwin']
cpp_args = ['-target', 'x86_64-apple-darwin']
objc_args = ['-target', 'x86_64-apple-darwin']
objcpp_args = ['-target', 'x86_64-apple-darwin']

c_link_args = ['-target', 'x86_64-apple-darwin']
cpp_link_args = ['-target', 'x86_64-apple-darwin']
objc_link_args = ['-target', 'x86_64-apple-darwin']
objcpp_link_args = ['-target', 'x86_64-apple-darwin']

[host_machine]
system = 'darwin'
cpu_family = 'x86_64'
cpu = 'x86_64'
endian = 'little'

