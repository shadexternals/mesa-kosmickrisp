[binaries]
c = 'clang'
cpp = 'clang++'
objc = 'clang'
objcpp = 'clang++'
ar = 'ar'
strip = 'strip'

[built-in options]
c_args = ['-target', 'aarch64-apple-darwin']
cpp_args = ['-target', 'aarch64-apple-darwin']
objc_args = ['-target', 'aarch64-apple-darwin']
objcpp_args = ['-target', 'aarch64-apple-darwin']

c_link_args = ['-target', 'aarch64-apple-darwin']
cpp_link_args = ['-target', 'aarch64-apple-darwin']
objc_link_args = ['-target', 'aarch64-apple-darwin']
objcpp_link_args = ['-target', 'aarch64-apple-darwin']

[host_machine]
system = 'darwin'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
